.ab-wc p{color:var(--text-dim);font-size:14.5px;position:relative}
.ab-wc .n{position:absolute;top:18px;right:22px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;
  color:var(--text-faint);transition:color .55s var(--ease)}
.ab-wc:hover .n{color:var(--accent)}

/* ---- 6 · MANUFACTURING BENTO ---- */
.ab-bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:clamp(130px,15vw,190px);
  gap:clamp(10px,1.2vw,16px);margin-top:clamp(40px,5vw,66px)}
.ab-tile{position:relative;overflow:hidden;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  grid-column:span 2}
.ab-tile.lg{grid-column:span 2;grid-row:span 2}
.ab-tile.sm{grid-column:span 1}
.ab-tile img{width:100%;height:100%;object-fit:cover;transform:scale(1.04);transition:transform 1.2s var(--ease);will-change:transform}
.ab-tile:hover img{transform:scale(1.12)}
.ab-tile .sc{position:absolute;inset:0;background:linear-gradient(180deg,transparent 34%,rgba(8,8,10,.72))}
.ab-tile figcaption{position:absolute;left:16px;right:16px;bottom:14px;display:flex;align-items:baseline;gap:10px}
/* the caption always sits on a dark scrim, so it must not follow the light theme */
.ab-tile .n{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:#CDBBE6}
.ab-tile .t{font-family:var(--serif);font-size:clamp(15px,1.5vw,20px);color:#F3F0EA}
.ab-tile.lg .t{font-size:clamp(20px,2.2vw,30px)}
/* labelled placeholder — a photo is missing, and it should look deliberate */
.ab-tile.ph{display:grid;place-items:center;text-align:center;padding:16px;
  background:repeating-linear-gradient(45deg,var(--surface),var(--surface) 10px,var(--surface-2) 10px,var(--surface-2) 20px);
  border-style:dashed;border-color:var(--line-2)}
.ab-tile.ph .pht{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);line-height:1.7}
.ab-tile.ph .pht b{display:block;color:var(--text);font-size:11px;letter-spacing:.16em;margin-bottom:6px}
@media(max-width:760px){
  .ab-bento{grid-template-columns:repeat(2,1fr);grid-auto-rows:150px}
  .ab-tile,.ab-tile.lg{grid-column:span 2;grid-row:span 1}
  .ab-tile.sm{grid-column:span 1}
}
.ab-pill{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:clamp(14px,1.6vw,20px)}
@media(max-width:820px){.ab-pill{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.ab-pill{grid-template-columns:1fr}}
.ab-pc{background:var(--bg);padding:clamp(22px,2.6vw,32px);transition:background .5s var(--ease)}
.ab-pc:hover{background:var(--surface)}
.ab-pc .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.ab-pc .v{font-family:var(--serif);font-size:clamp(26px,3vw,40px);line-height:1.1;margin:10px 0 8px;
  background:var(--opal);-webkit-background-clip:text;background-clip:text;color:transparent}
.ab-pc .l{color:var(--text-dim);font-size:13.5px}

/* ---- 7 · GLOBAL ---- */
.ab-global{display:grid;grid-template-columns:1.25fr 1fr;gap:clamp(28px,4vw,64px);align-items:center}
@media(max-width:900px){.ab-global{grid-template-columns:1fr}}

/* ---- 9 · CERTS ---- */
.ab-certs{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,1.8vw,24px);margin-top:clamp(40px,5vw,60px)}
@media(max-width:820px){.ab-certs{grid-template-columns:1fr}}
.ab-cert{position:relative;padding:clamp(26px,3vw,38px);border:1px solid var(--line);border-radius:12px;
  background:var(--surface);overflow:hidden;transition:.5s var(--ease)}
.ab-cert:hover{transform:translateY(-4px);border-color:var(--line-2);box-shadow:0 26px 60px rgba(0,0,0,.3)}
.ab-cert .seal{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;margin-bottom:18px;
  border:1px solid var(--accent);color:var(--accent)}
.ab-cert .seal svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
/* supplied artwork — contained, never recoloured or cropped (same treatment as
   the Certifications page) */
.ab-cert .cbadge{height:92px;display:flex;align-items:center;margin-bottom:18px}
.ab-cert .cbadge img{height:100%;width:auto;object-fit:contain;transition:transform .5s var(--ease)}
.ab-cert:hover .cbadge img{transform:scale(1.05)}
.ab-cert h3{font-family:var(--serif);font-size:26px;margin-bottom:12px}
.ab-cert p{color:var(--text-dim);font-size:14.5px}
.ab-warr{margin-top:clamp(14px,1.8vw,24px);padding:clamp(26px,3.4vw,44px);border:1px solid var(--line);border-radius:12px;
  background:linear-gradient(120deg,var(--surface),var(--bg));display:flex;align-items:center;justify-content:space-between;
  gap:28px;flex-wrap:wrap}
.ab-warr h3{font-family:var(--serif);font-size:clamp(24px,2.8vw,34px);margin-bottom:12px}
.ab-warr p{color:var(--text-dim);font-size:15px;max-width:62ch}
.ab-warr b{color:var(--text)}

/* ---- 10 · CTA ---- */
.ab-cta{position:relative;overflow:hidden;text-align:center;border-top:1px solid var(--line)}
.ab-cta .bg{position:absolute;inset:-10% 0;z-index:0;will-change:transform}
.ab-cta .bg img{width:100%;height:100%;object-fit:cover;opacity:.5}
/* enough scrim to hold the type, not so much that the slab disappears */
.ab-cta::after{content:"";position:absolute;inset:0;z-index:1;
  background:radial-gradient(70% 100% at 50% 50%,rgba(8,8,10,.34),rgba(8,8,10,.72) 55%,var(--bg) 92%)}
:root[data-theme="light"] .ab-cta::after{background:radial-gradient(70% 100% at 50% 50%,rgba(237,234,227,.42),rgba(237,234,227,.8) 55%,var(--bg) 92%)}
.ab-cta .wrap{position:relative;z-index:2}
.ab-cta h2{font-size:clamp(34px,6vw,80px);line-height:.98;max-width:16ch;margin:22px auto 0}
.ab-cta h2 em{font-style:italic;color:var(--accent)}
.ab-cta p{color:var(--text-dim);margin:22px auto 0;max-width:52ch}
.ab-cta .row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:36px}

@media(prefers-reduced-motion:reduce){
  .ab-hero h1 .w,.ab-hero .lead,.ab-hero .eyebrow,.ab-hcta{opacity:1;transform:none;animation:none}
  .ab-cue::after{animation:none}
  .ab-hbg,.ab-cta .bg,.ab-svis .inset{transform:none!important}
}

<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Organization","name":"Artizia",
 "description":"Quartz slab manufacturer, exporter and supplier of super jumbo quartz slabs and luxury quartz surfaces for kitchen countertops, bathroom vanities, table tops and commercial projects.",
 "url":"https://artizia.co.in/","logo":"https://artizia.co.in/assets/img/brand/logo-full.png",
 "address":{"@type":"PostalAddress","addressLocality":"Jaipur","addressRegion":"Rajasthan","addressCountry":"IN",
   "streetAddress":"Mahindra World City"},
 "sameAs":["https://www.instagram.com/artizia_by_marudhar/"]}

<script src="assets/js/data.js"></script>
<script src="assets/js/marble.js"></script>
<script src="assets/js/map.js"></script>
<script src="assets/js/worldmap.js"></script>
<script src="assets/js/app.js"></script>
<script>
(function(){
  const P=window.PAGE, A=window.Artizia, $=id=>document.getElementById(id);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
  const pad=n=>String(n).padStart(2,'0');

  /* line-art icons — drawn here, so nothing is fetched and nothing is stock */
  const ICONS={
    breton:'<rect x="3" y="4" width="18" height="5" rx="1"/><path d="M6 9v3M18 9v3"/><rect x="3" y="12" width="18" height="3" rx="1"/><path d="M5 15v5M19 15v5M9 18h6"/>',
    slab:  '<rect x="2" y="7" width="20" height="10" rx="1"/><path d="M2 11h20M8 7v10M16 7v10"/>',
    globe: '<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18"/>',
    shield:'<path d="M12 3l7 3v5c0 5-3 8.3-7 10-4-1.7-7-5-7-10V6z"/><path d="M9 12l2 2 4-4"/>',
    leaf:  '<path d="M4 20c0-8 5-13 16-14 0 10-5 15-13 15H4z"/><path d="M9 15c1.5-3 4-5 7-6"/>',
    quarry:'<path d="M3 20l5-9 4 5 3-4 6 8z"/><path d="M3 20h18"/><circle cx="8" cy="6" r="2"/>',
    seal:  '<circle cx="12" cy="10" r="6"/><path d="M9 10l2 2 4-4"/><path d="M8 15.5L7 22l5-2 5 2-1-6.5"/>'
  };
  const icon=(k,cls)=>`<span class="${cls||'ic'}"><svg viewBox="0 0 24 24" aria-hidden="true">${ICONS[k]||ICONS.slab}</svg></span>`;

  /* ---- 1 · hero ---- */
  const H=P.hero||{};
  $('abHbg').innerHTML = H.image
    ? `<img src="${esc(H.image)}" alt="${esc(H.alt||'')}" fetchpriority="high">` : '';
  $('hEye').textContent = H.eyebrow||'';
  /* wrap each word so the headline can rise in sequence — <em> and <br> survive */
  let wi=0;
  $('hTitle').innerHTML = (H.title||'').replace(/(<br\s*\/?>)|(<em>.*?<\/em>|[^\s<]+)/g,
    (m,br)=> br || `<span class="w" style="--i:${wi++}">${m}</span>`);
  $('hLead').textContent = H.lead||'';
  $('hCta').innerHTML =
    (H.cta  ? `<a class="btn btn-fill mag" href="${esc(H.cta.href)}"><span>${esc(H.cta.label)} <span class="arw">→</span></span></a>`:'')
  + (H.cta2 ? `<a class="btn btn-line mag" href="${esc(H.cta2.href)}"><span>${esc(H.cta2.label)}</span></a>`:'');
  /* .stat + .rv is what the shared observer counts — reuse it, don't re-invent it */
  $('hFacts').innerHTML = (H.facts||[]).map((f,i)=>
    `<div class="f stat rv${i?' d'+Math.min(i,3):''}"><div class="num" data-to="${+f.value||0}">
       <span class="v">0</span><span class="suf">${esc(f.suffix||'')}</span></div>
     <div class="lbl">${esc(f.label)}</div></div>`).join('');

  /* ---- 2 · story ---- */
  const S=P.story||{};
  $('sVis').innerHTML = `
    <figure class="fr" id="sFrame">
      ${S.badge?`<span class="badge">${esc(S.badge)}</span>`:''}
      ${S.video
        ? `<video id="sVid" src="${esc(S.video)}" ${S.poster?`poster="${esc(S.poster)}"`:''} muted loop playsinline preload="metadata"></video>
           <button class="mute" id="sMute" type="button" aria-label="Unmute video">🔇</button>`
        : `<img src="${esc(S.poster||'')}" alt="Artizia manufacturing, Jaipur" loading="lazy">`}
    </figure>
    ${S.inset?`<div class="inset" id="sInset"><img src="${esc(S.inset)}" alt="Calacatta Gold engineered quartz slab detail" loading="lazy"></div>`:''}`;
  $('sEye').textContent=S.eyebrow||'';
  $('sTitle').innerHTML=S.title||'';
  $('sBody').innerHTML=(S.body||[]).map(p=>`<p>${p}</p>`).join('');
  $('sPull').textContent=S.pull||'';

  const vid=$('sVid');
  if(vid){
    /* match the frame to the video's real shape rather than guessing at it */
    vid.addEventListener('loadedmetadata',()=>{
      const w=vid.videoWidth,h=vid.videoHeight;
      if(!w||!h) return;
      const fr=$('sFrame');
      fr.style.aspectRatio=`${w}/${h}`;
      fr.classList.toggle('portrait', h>w);
    });
    /* only play while it is on screen — an off-screen video is wasted battery */
    new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting && !reduce) vid.play().catch(()=>{}); else vid.pause();
    }),{threshold:.25}).observe(vid);
    $('sMute').addEventListener('click',()=>{
      vid.muted=!vid.muted;
      $('sMute').textContent = vid.muted?'🔇':'🔊';
      $('sMute').setAttribute('aria-label', vid.muted?'Unmute video':'Mute video');
      if(!vid.muted) vid.play().catch(()=>{});
    });
  }

  /* ---- 4 · timeline ---- */
  const T=P.timeline||{}, miles=T.milestones||[];
  $('tEye').textContent=T.eyebrow||''; $('tTitle').innerHTML=T.title||''; $('tLead').textContent=T.lead||'';
  $('tlList').innerHTML=miles.map(m=>`<li class="ab-mile">
      <span class="dot"></span>
      <div class="card rv"><span class="yr">${esc(m.year)}</span><h3>${esc(m.title)}</h3><p>${esc(m.text)}</p></div>
    </li>`).join('');

  /* ---- 5 · why ---- */
  const W=P.why||{};
  $('wEye').textContent=W.eyebrow||''; $('wTitle').innerHTML=W.title||'';
  $('whyGrid').innerHTML=(W.cards||[]).map((c,i)=>`<article class="ab-wc rv${i%3?' d'+(i%3):''}">
      <span class="n">${pad(i+1)}</span>${icon(c.icon)}
      <h3>${esc(c.title)}</h3><p>${esc(c.text)}</p></article>`).join('');

  /* ---- 6 · manufacturing ---- */
  const M=P.making||{};
  $('mEye').textContent=M.eyebrow||''; $('mTitle').innerHTML=M.title||'';
  /* lead takes one string or several — a plain string still renders as one paragraph */
  $('mLead').innerHTML=[].concat(M.lead||[]).map(t=>`<p>${esc(t)}</p>`).join('');
  $('bento').innerHTML=(M.tiles||[]).map((t,i)=>{
    const cls=`ab-tile ${esc(t.size||'wd')} rv${i%3?' d'+(i%3):''}`;
    /* no photo yet → a labelled placeholder, so a gap never reads as a bug */
    if(!t.image) return `<figure class="${cls} ph"><span class="pht"><b>${esc(t.n)} · ${esc(t.title)}</b>Placeholder — add photo</span></figure>`;
    return `<figure class="${cls}"><img src="${esc(t.image)}" alt="${esc(t.alt||t.title)}" loading="lazy">
      <span class="sc"></span>
      <figcaption><span class="n">${esc(t.n)}</span><span class="t">${esc(t.title)}</span></figcaption></figure>`;
  }).join('');
  $('pillars').innerHTML=(M.pillars||[]).map(p=>
    `<div class="ab-pc"><div class="k">${esc(p.k)}</div><div class="v">${esc(p.v)}</div><div class="l">${esc(p.l)}</div></div>`).join('');

  /* ---- 7 · global ---- */
  const G=P.global||{};
  $('gEye').textContent=G.eyebrow||''; $('gTitle').innerHTML=G.title||''; $('gLead').textContent=G.lead||'';
  if(window.MAPDATA && window.buildWorldMap) window.buildWorldMap($('worldmap'), G, window.MAPDATA);
  else $('worldmap').innerHTML='<div class="dots"></div>';
  $('gStats').innerHTML=(G.stats||[]).map((st,i)=>
    `<div class="stat rv${i?' d'+Math.min(i,3):''}"><div class="num" data-to="${+st.value||0}">
       <span class="v">0</span><span class="suf">${esc(st.suffix||'')}</span></div>
     <div class="lbl">${esc(st.label)}</div></div>`).join('');

  /* ---- 8 · values ---- */
  const V=P.values||{};
  $('vEye').textContent=V.eyebrow||''; $('vTitle').innerHTML=V.title||'';
  $('values').innerHTML=(V.list||[]).map((f,i)=>
    `<div class="why-row rv"><span class="i">${pad(i+1)}</span><h4>${esc(f.title)}</h4><p>${esc(f.text)}</p></div>`).join('');

  /* ---- 9 · certifications ---- */
  const C=P.certs||{};
  $('cEye').textContent=C.eyebrow||''; $('cTitle').innerHTML=C.title||'';
  /* the real certificate mark where we have the artwork, the generic seal where
     we don't — so a missing file degrades to the old design, not a broken image */
  $('certs').innerHTML=(C.list||[]).map((c,i)=>`<article class="ab-cert rv${i?' d'+i:''}">
      ${c.image
        ? `<div class="cbadge"><img src="${esc(c.image)}" alt="${esc(c.name)} certification" loading="lazy"></div>`
        : icon('seal','seal')}
      <h3>${esc(c.name)}</h3><p>${esc(c.text)}</p></article>`).join('');
  $('warrTitle').textContent=(C.warranty||{}).title||'';
  $('warrText').innerHTML=(C.warranty||{}).text||'';

  /* ---- 10 · cta ---- */
  const X=P.cta||{};
  $('ctaBg').innerHTML = X.image?`<img src="${esc(X.image)}" alt="" aria-hidden="true" loading="lazy">`:'';
  $('ctaEye').textContent=X.eyebrow||''; $('ctaTitle').innerHTML=X.title||''; $('ctaText').textContent=X.text||'';

  /* ---- philosophy line ---- */
  $('mani').innerHTML=P.manifesto||'';
  A.initManifesto($('mani'));

  /* ═══ one scroll loop for every parallax + the timeline fill ═══ */
  const hbg=$('abHbg'), inset=$('sInset'), ctaBg=$('ctaBg'), tl=$('tl');
  const dots=[...document.querySelectorAll('.ab-mile')];
  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));

  function frame(){
    const vh=innerHeight;

    if(hbg){                                   /* hero: image drifts slower than the page */
      const r=$('abHero').getBoundingClientRect();
      if(r.bottom>0) hbg.style.transform=`translate3d(0,${(-r.top*0.16).toFixed(1)}px,0)`;
    }
    if(inset){                                 /* story inset: a gentle counter-drift */
      const r=inset.getBoundingClientRect();
      if(r.bottom>0 && r.top<vh){
        const p=(vh-r.top)/(vh+r.height)-0.5;
        inset.style.transform=`translate3d(0,${(p*-34).toFixed(1)}px,0)`;
      }
    }
    if(ctaBg){
      const r=$('abCta').getBoundingClientRect();
      if(r.bottom>0 && r.top<vh){
        const p=(vh-r.top)/(vh+r.height)-0.5;
        ctaBg.style.transform=`translate3d(0,${(p*-40).toFixed(1)}px,0)`;
      }
    }
    if(tl && dots.length){                     /* timeline: fill the spine, light the dots */
      const r=tl.getBoundingClientRect();
      const p=cl((vh*0.62 - r.top)/r.height, 0, 1);
      tl.style.setProperty('--tlp',(p*100).toFixed(2)+'%');
      const head=r.top + r.height*p;
      dots.forEach(li=>{
        const d=li.querySelector('.dot').getBoundingClientRect();
        li.classList.toggle('on', d.top + d.height/2 <= head + 2);
      });
    }
  }

  let tick=false;
  addEventListener('scroll',()=>{
    if(tick||reduce) return; tick=true;
    requestAnimationFrame(()=>{ frame(); tick=false; });
  },{passive:true});
  addEventListener('resize',frame,{passive:true});
  if(reduce){ tl.style.setProperty('--tlp','100%'); dots.forEach(d=>d.classList.add('on')); }
  else frame();

  A.refresh();   /* reveal + magnetic buttons + the .stat counters */
})();
</script>
</body>
</html>
