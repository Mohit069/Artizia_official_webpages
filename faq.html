<script>
window.PAGE = {

  /* ---- banner behind the page heading ---- */
  banner: {
    image:    "",                       /* e.g. "assets/img/faq-banner.jpg" */
    alt:      "Artizia quartz surface",
    fallback: "jaipur-fog",             /* marble used while image is "" */
    zoom:     1.4,
    eyebrow:  "Resources · FAQ",
    title:    "Questions, <em>answered.</em>",
    lead:     "Everything you need to know about our quartz slabs — sizes, finishes, samples, delivery, installation and the lifetime warranty."
  },

  /* ---- the questions.  Add, remove or reorder freely.
     Grouped loosely: what we make → quality → ordering → installation.
     These also feed the FAQPage structured data at the bottom of the page,
     so Google can show them directly in search results. ---- */
  faqs: [
    { q: "What does Artizia manufacture?",
      a: "Artizia is a quartz slab manufacturer, exporter and supplier based at Mahindra World City, Jaipur. We engineer premium quartz slabs — including super jumbo quartz slabs at 3200 × 1600 mm — across 100+ designs, all pressed on Breton technology to global standards of durability and finish." },

    { q: "What makes Artizia quartz different?",
      a: "Three things: the technology, the grade and the scale. Every slab is vibro-compressed on Breton machinery, the benchmark the world's finest luxury quartz surfaces are made on. The grade we ship to North America, the UK and Australia is the grade we sell in India — there is no second tier. And our super jumbo format means fewer seams across long islands and table tops." },

    { q: "Are Artizia surfaces suitable for both homes and commercial projects?",
      a: "Yes. Our quartz slabs are specified for kitchen countertops, bathroom vanity tops, dining and table tops, and quartz slabs for commercial projects — hotels, restaurants, offices and retail. The same non-porous, low-maintenance surface that suits a family kitchen also survives a 200-key hotel." },

    { q: "Which quartz colours and designs do you offer?",
      a: "Our range spans luminous white quartz slabs, warm ivory quartz slabs and soft beige quartz slabs, through to quartz slabs with golden veins for statement islands, and deep charcoals and blacks. From minimal solids to marble-inspired modern quartz designs — browse all 53 across the collections page." },

    { q: "What is engineered quartz?",
      a: "Engineered quartz combines roughly 90–93% natural quartz aggregate with resins and pigments, compacted under vacuum and vibration on Breton technology. The result is a non-porous surface that is harder, more consistent and more durable than natural stone." },

    { q: "What slab sizes and thicknesses are available?",
      a: "Our standard format is 3200 × 1600 mm — a super jumbo quartz slab — in 20 mm and 30 mm thicknesses, polished or honed. The larger format means longer runs with fewer joints. Availability varies by design, so check the product page for the exact specification." },

    { q: "Are Artizia surfaces moisture and fire resistant?",
      a: "Yes. Quartz is non-porous, so moisture cannot soak in — which is why it suits bathroom vanities and wet areas without sealing. Our surfaces are also rated Class A for surface burning, and are resistant to mould and mildew." },

    { q: "Is Artizia quartz heat resistant?",
      a: "It withstands normal kitchen heat, but the resin binder can scorch under prolonged or direct heat. Always use a trivet under hot cookware — no engineered quartz, from any manufacturer, is designed to take a pan straight off the flame." },

    { q: "Do I need to seal my Artizia surface?",
      a: "No. Artizia quartz is non-porous, so it never needs sealing — unlike granite or marble, which require resealing every year or two." },

    { q: "How do I clean and maintain my quartz surface?",
      a: "A soft cloth and mild detergent, and that is the entire maintenance schedule. Avoid harsh chemicals, bleach and abrasive pads, which can dull the polish. Spills — coffee, wine, oil — wipe away without soaking in." },

    { q: "Can I order samples before placing an order?",
      a: "Yes, and we recommend it — colour reads differently under your own light. Use the sample tray on any product page: samples are free, ship anywhere in India in 5–7 days, and you may request up to four at a time." },

    { q: "How long does delivery take?",
      a: "Lead times depend on the design, thickness and order size. Tell us the project and we'll confirm a delivery estimate before you commit — our team in Jaipur usually comes back the same working day." },

    { q: "Do you offer custom designs or bulk supply?",
      a: "Yes. As a quartz slab supplier to projects large and small, we handle custom requirements and bulk orders for developers, architects and fabricators. Share the specification and we'll quote it." },

    { q: "Do you provide installation?",
      a: "Installation is available through certified fabrication partners, and availability varies by region. Contact our team with your location and we'll connect you with the right installer." },

    { q: "How do I make sure my slab is installed correctly?",
      a: "Use a professional fabricator. Templating, seam placement, cut-outs and support all affect how the finished surface looks and lasts — a super jumbo slab is heavy, and it rewards being handled by someone who does it every day." },

    { q: "What does the warranty cover?",
      a: "A Lifetime Warranty against manufacturing defects, covering scratches, stains, heat, household chemicals, mould and mildew. See the warranty page for the full terms." }
  ],

  /* ---- closing call-to-action ---- */
  cta: {
    eyebrow: "Still Curious?",
    title:   "We're happy <em>to help.</em>",
    text:    "Reach our team in Jaipur for anything not covered here."
  }
};
</script>

<script>
(function(){
  const P=window.PAGE,$=id=>document.getElementById(id);
  const list=(P.faqs&&P.faqs.length)?P.faqs.map(f=>[f.q,f.a]):window.FAQS;
  $('faqs').innerHTML=list.map((f,i)=>`<details class="faq-item"${i===0?' open':''}><summary>${f[0]}<span class="pm">+</span></summary><div class="fa">${f[1]}</div></details>`).join('');
  const c=P.cta||{}; $('ctaEye').textContent=c.eyebrow||''; $('ctaTitle').innerHTML=c.title||''; $('ctaText').textContent=c.text||'';
  $('ctaSamples').addEventListener('click',e=>{e.preventDefault();window.openTray();});

  /* FAQPage structured data, generated from the same list — so the answers can
     never drift apart from the ones on screen. Lets Google surface them directly. */
  const ld=document.createElement('script');
  ld.type='application/ld+json';
  ld.textContent=JSON.stringify({
    "@context":"https://schema.org","@type":"FAQPage",
    mainEntity:list.map(f=>({"@type":"Question",name:f[0],
      acceptedAnswer:{"@type":"Answer",text:String(f[1]).replace(/<[^>]+>/g,'')}}))
  });
  document.head.appendChild(ld);

  window.Artizia.refresh();
})();
</script>
