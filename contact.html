<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Artizia Quartz</title>
<meta name="description" content="Get in touch with Artizia — request samples, quotes or design guidance. Based at Mahindra World City, Jaipur.">
<link rel="canonical" href="https://artizia.co.in/contact.html">
<link rel="icon" type="image/png" href="assets/img/brand/favicon-64.png">
<link rel="apple-touch-icon" href="assets/img/brand/apple-touch-icon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="contact">

<!--
═══════════════════════════════════════════════════════════════════════
  CONTACT PAGE CONTENT  —  EDIT EVERYTHING HERE
═══════════════════════════════════════════════════════════════════════
  IMAGES  put files in  assets/img/  then write  "assets/img/name.jpg"
  Leave  image: ""  and a live marble texture is used instead.

  NOTE  the phone, email, address, hours and map link are NOT here.
  They appear in the footer of every page too, so they live in one
  place:  assets/js/data.js  ->  window.SITE
═══════════════════════════════════════════════════════════════════════
-->
<script>
window.PAGE = {

  /* ---- banner behind the page heading ---- */
  banner: {
    image:    "",                       /* e.g. "assets/img/contact-banner.jpg" */
    alt:      "Artizia quartz surface",
    fallback: "oceana",
    zoom:     1.3,
    eyebrow:  "Get in Touch",
    title:    "Let's build <em>something lasting.</em>",
    lead:     "Questions, samples, quotes or design guidance — our team in Jaipur is here to help."
  },

  /* ---- labels down the left column ---- */
  labels: { call: "Call", email: "Email", visit: "Visit", hours: "Hours" },

  /* ---- the map below the form.  What it points at lives in
     assets/js/data.js -> window.SITE.mapQuery / mapZoom ---- */
  map: {
    eyebrow: "Find Us",
    title:   "The plant, <em>on the map.</em>",
    lead:    "Our quartz slab manufacturing facility at Mahindra World City, Jaipur — 40 minutes from the city centre, 30 from the airport."
  }
};
</script>

<section class="page-hero">
  <div class="ph-vis"></div>
  <div class="wrap">
    <span class="eyebrow"></span>
    <h1></h1>
    <p class="lead"></p>
  </div>
</section>

<section class="pad" style="padding-top:clamp(20px,4vw,50px)"><div class="wrap"><div class="contact-grid">
  <div class="cinfo rv">
    <div class="row"><span class="k" id="kCall"></span><a class="v" href="tel:+918952815800" id="cPhone"></a></div>
    <div class="row"><span class="k" id="kEmail"></span><a class="v" href="mailto:sales@artizia.co.in" id="cEmail"></a></div>
    <div class="row"><span class="k" id="kVisit"></span><span class="v" id="cAddr"></span></div>
    <div class="row" style="border:0"><span class="k" id="kHours"></span><span class="v" id="cHours" style="font-size:15px;line-height:1.9"></span></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <a class="btn btn-line mag" id="cMap" target="_blank" rel="noopener"><span>Open in Maps →</span></a>
      <a class="btn btn-line mag" href="#" id="cSamples"><span>Request Samples</span></a>
    </div>
  </div>
  <div class="rv d1">
    <form class="form" id="cform">
      <div class="g2"><div class="field"><label>Full Name</label><input id="c_name" name="name" required placeholder="Your name"></div>
        <div class="field"><label>Phone</label><input id="c_phone" name="phone" required placeholder="+91"></div></div>
      <div class="field"><label>Email</label><input id="c_email" name="email" type="email" required placeholder="you@email.com"></div>
      <div class="field"><label>Subject</label><input id="c_subject" name="subject" placeholder="How can we help?"></div>
      <div class="field"><label>Message</label><textarea id="c_message" name="message" rows="5" required placeholder="Tell us about your project…"></textarea></div>
      <!-- honeypot: hidden from people, irresistible to bots -->
      <input class="hp" name="website" tabindex="-1" autocomplete="off" aria-hidden="true">
      <button class="btn btn-fill mag" type="submit" id="cSend"><span>Send Message <span class="arw">→</span></span></button>
      <p class="mono" style="font-size:11px;color:var(--text-faint)" id="cResult"></p>
    </form>
  </div>
</div></div></section>

<!-- ===== PLANT LOCATION MAP ===== -->
<section class="pad" style="padding-top:0"><div class="wrap">
  <div class="sec-head rv" style="margin-bottom:clamp(22px,3vw,36px)">
    <span class="eyebrow" id="mapEye"></span>
    <h2 id="mapTitle"></h2>
    <p id="mapLead"></p>
  </div>
  <div class="gmap rv" id="gmap">
    <div class="gmap-card">
      <span class="k">Artizia · Marudhar Quartz</span>
      <p id="gmapAddr"></p>
      <a class="btn btn-line mag" id="gmapDir" target="_blank" rel="noopener"><span>Get Directions <span class="arw">→</span></span></a>
    </div>
  </div>
</div></section>

<script src="assets/js/data.js"></script>
<script src="assets/js/marble.js"></script>
<script src="assets/js/app.js"></script>
<script>
(function(){
  const P=window.PAGE,S=window.SITE,$=id=>document.getElementById(id);
  const L=P.labels||{};
  $('kCall').textContent=L.call||'Call'; $('kEmail').textContent=L.email||'Email';
  $('kVisit').textContent=L.visit||'Visit'; $('kHours').textContent=L.hours||'Hours';

  $('cPhone').textContent=S.phone; $('cPhone').href='tel:'+S.phoneRaw;
  $('cEmail').textContent=S.email; $('cEmail').href='mailto:'+S.email;
  $('cAddr').textContent=S.address;
  $('cHours').innerHTML=S.hours.map(h=>`${h[0]} — ${h[1]}`).join('<br>');
  $('cMap').href=S.mapUrl;
  $('cSamples').addEventListener('click',e=>{e.preventDefault();window.openTray();});

  /* ---- plant location map ----
     Google's keyless embed endpoint: it takes any search query (a place name
     or a "lat,lng" pair) and needs no API key or billing account. */
  (function(){
    const M=P.map||{}, host=$('gmap');
    if(!host) return;
    $('mapEye').textContent=M.eyebrow||''; $('mapTitle').innerHTML=M.title||''; $('mapLead').textContent=M.lead||'';
    $('gmapAddr').textContent=S.address||'';
    $('gmapDir').href=S.mapUrl||'#';

    const q=S.mapQuery||S.address||'Mahindra World City Jaipur';
    const src='https://www.google.com/maps?q='+encodeURIComponent(q)
            + '&z='+(S.mapZoom||14)+'&hl=en&output=embed';

    /* an iframe here is ~700KB of Google's JS — don't pay for it until the
       map is actually about to be looked at */
    const load=()=>{
      if(host.querySelector('iframe')) return;
      const f=document.createElement('iframe');
      f.src=src; f.loading='lazy'; f.title='Artizia quartz slab plant — Mahindra World City, Jaipur';
      f.referrerPolicy='no-referrer-when-downgrade'; f.allowFullscreen=true;
      host.prepend(f);
    };
    new IntersectionObserver((es,io)=>{
      if(es[0].isIntersecting){ io.disconnect(); load(); }
    },{rootMargin:'400px'}).observe(host);
  })();

  /* Messages are stored in the database and read in the admin panel (Enquiries). */
  $('cform').addEventListener('submit',async e=>{
    e.preventDefault();
    const btn=$('cSend'), out=$('cResult');
    btn.disabled=true; out.style.color='var(--text-faint)'; out.textContent='Sending…';
    try{
      const r=await fetch('/api/enquiries',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'contact',name:$('c_name').value,phone:$('c_phone').value,
          email:$('c_email').value,subject:$('c_subject').value,message:$('c_message').value,
          website:e.target.website.value})});
      const j=await r.json();
      if(!r.ok) throw new Error(j.error||'Could not send your message.');
      e.target.reset();
      out.style.color='var(--accent)';
      out.textContent='✓ Message received. We’ll be in touch shortly.';
    }catch(err){
      out.style.color='#E0716A';
      out.textContent='✕ '+err.message+' You can also email '+(S.email||'us')+'.';
    }finally{ btn.disabled=false; }
  });

  window.Artizia.refresh();
})();
</script>
<script src="assets/js/pageedit.js"></script>
</body>
</html>
